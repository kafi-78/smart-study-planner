<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Planner</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.15)',
                        glassBorder: 'rgba(255, 255, 255, 0.3)',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-800 to-indigo-900 min-h-screen text-white font-sans overflow-x-hidden antialiased">
    <!-- Clock Element -->
    <div class="fixed top-4 right-4 lg:top-6 lg:right-8 z-50 scale-90 lg:scale-100 glass-card px-5 py-2.5 rounded-2xl border border-white/20 shadow-[0_8px_32px_0_rgba(31,38,135,0.37)] flex items-center space-x-3 transition-transform hover:scale-105 duration-300">
        <span class="text-pink-400 font-bold tracking-widest text-xs uppercase animate-pulse">Time</span>
        <div class="w-px h-5 bg-white/20"></div>
        <span id="digitalClock" class="font-mono text-xl tracking-wider font-semibold bg-clip-text text-transparent bg-gradient-to-r from-cyan-300 to-blue-300 drop-shadow-md">
            00:00:00 AM
        </span>
    </div>

    <!-- Background Elements -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-96 h-96 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-[500px] h-[500px] bg-pink-500 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-4000"></div>
    </div>

    <div class="container mx-auto px-4 py-12 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-pink-300 to-indigo-300 drop-shadow-sm">Smart Study Planner</h1>
            <p class="text-indigo-200 text-lg max-w-2xl mx-auto text-center">
  Optimize your study schedule
</p>

<p class="mt-2 text-2xl font-bold text-transparent bg-clip-text 
bg-gradient-to-r from-purple-300 to-pink-300 text-center">
  رَبِّ زِدْنِي عِلْمًا
</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Column: Controls -->
            <div class="lg:col-span-5 space-y-8">
                
                <!-- Settings Card -->
                <div class="glass-card p-6 rounded-2xl shadow-[0_8px_32px_0_rgba(31,38,135,0.37)] border border-white/20 backdrop-blur-md relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-pink-400 to-purple-500"></div>
                    <h2 class="text-xl font-semibold mb-4 text-white">Daily Goal</h2>
                    <div class="flex flex-col space-y-2">
                        <label for="totalHours" class="text-sm text-indigo-200">Total Study Hours</label>
                        <input type="number" id="totalHours" value="8" min="1" max="24" class="bg-black/20 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-indigo-300 focus:outline-none focus:ring-2 focus:ring-purple-400 transition-all">
                    </div>
                </div>

                <!-- Add Subject Card -->
                <div class="glass-card p-6 rounded-2xl shadow-[0_8px_32px_0_rgba(31,38,135,0.37)] border border-white/20 backdrop-blur-md relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-400 to-cyan-400"></div>
                    <h2 class="text-xl font-semibold mb-4 text-white">Add Subject</h2>
                    <form id="addSubjectForm" class="space-y-4">
                        <div class="flex flex-col space-y-2">
                            <label for="subjectName" class="text-sm text-indigo-200">Subject Name</label>
                            <input type="text" id="subjectName" required placeholder="e.g. Mathematics" class="bg-black/20 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-indigo-300 focus:outline-none focus:ring-2 focus:ring-cyan-400 transition-all">
                        </div>
                        <div class="flex flex-col space-y-2">
                            <label for="subjectPriority" class="text-sm text-indigo-200">Priority Level</label>
                            <select id="subjectPriority" class="bg-black/20 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-400 transition-all appearance-none">
                                <option value="3" class="bg-indigo-900 text-white">High (Multiplier x3)</option>
                                <option value="2" class="bg-indigo-900 text-white" selected>Medium (Multiplier x2)</option>
                                <option value="1" class="bg-indigo-900 text-white">Low (Multiplier x1)</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full mt-4 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-medium py-3 px-6 rounded-lg transition-all duration-300 transform hover:-translate-y-1 hover:shadow-lg shadow-indigo-500/50">
                            Add Subject
                        </button>
                    </form>
                </div>

            </div>

            <!-- Right Column: Visualization & List -->
            <div class="lg:col-span-7 space-y-8">
                
                <!-- Chart Card -->
                <div class="glass-card p-6 rounded-2xl shadow-[0_8px_32px_0_rgba(31,38,135,0.37)] border border-white/20 backdrop-blur-md relative overflow-hidden h-80 flex flex-col justify-center items-center">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-teal-400 to-emerald-400"></div>
                    <canvas id="studyChart" class="w-full h-full"></canvas>
                    <div id="emptyChartMessage" class="absolute inset-0 flex items-center justify-center text-indigo-300 pointer-events-none">
                        Add subjects to see your study allocation
                    </div>
                </div>

                <!-- Subjects List Card -->
                <div class="glass-card p-6 rounded-2xl shadow-[0_8px_32px_0_rgba(31,38,135,0.37)] border border-white/20 backdrop-blur-md relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-orange-400 to-pink-500"></div>
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-semibold text-white">Your Subjects</h2>
                        <span id="totalAllocatedHours" class="text-sm bg-white/10 px-3 py-1 rounded-full text-indigo-200">0 / 8 hrs</span>
                    </div>
                    
                    <div id="subjectList" class="space-y-3 max-h-96 overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Subject Items will be injected here via JS -->
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
